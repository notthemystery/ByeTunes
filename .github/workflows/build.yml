name: Build Package

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Release)
        run: swift build -c release

      - name: Archive build products
        run: |
          mkdir -p artifacts
          cp -R .build/release artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-build
          path: artifacts/
